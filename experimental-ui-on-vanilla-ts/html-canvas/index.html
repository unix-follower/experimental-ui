<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HTML Canvas Demo</title>
  </head>
  <body>
    <label for="select-shape">Shape</label>
    <select id="select-shape">
      <option value="">All</option>
      <option value="circle">Circle</option>
      <option value="rectangle">Rectangle</option>
      <option value="lines">Lines</option>
    </select>
    <div>
      <input
        type="color"
        id="background"
        name="background"
        value="rgba(0, 0, 0, 0.5)"
        colorspace="display-p3"
        alpha
      />
      <label for="background">Background color</label>
    </div>
    <div>
      <input
        type="color"
        id="stroke"
        name="stroke"
        value="rgba(0, 0, 0, 0.5)"
        colorspace="display-p3"
        alpha
      />
      <label for="stroke">Stroke color</label>
    </div>
    <div>
      <label for="coords">Coordinates</label>
      <section id="coords">
        <label for="x">x</label>
        <input type="number" id="x" name="x" min="0" max="10" value="1" step="1" />
        <label for="y">y</label>
        <input type="number" id="y" name="y" min="0" max="10" value="1" step="1" />
        <label for="width">Width</label>
        <input type="number" id="width" name="width" min="0" max="10" value="1" step="1" />
        <label for="height">Height</label>
        <input type="number" id="height" name="height" min="0" max="10" value="1" step="1" />
        <label for="radius">Radius</label>
        <input type="number" id="radius" name="radius" min="0" max="10" value="1" step="1" />
        <label for="startAngle">Start Angle</label>
        <input
          type="number"
          id="startAngle"
          name="startAngle"
          min="0"
          max="360"
          value="1"
          step="1"
        />
        <label for="endAngle">End Angle</label>
        <input type="number" id="endAngle" name="endAngle" min="0" max="360" value="1" step="1" />
      </section>
    </div>
    <canvas id="canvas" width="800" height="600"></canvas>
    <script type="module" src="main.ts"></script>
  </body>
</html>
