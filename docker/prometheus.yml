global:
  scrape_interval: 15s
  scrape_timeout: 10s
  evaluation_interval: 15s
alerting:
  alertmanagers:
    - follow_redirects: true
      scheme: http
      timeout: 10s
      api_version: v2
      static_configs:
        - targets: [ ]
scrape_configs:
  - job_name: prometheus
    honor_timestamps: true
    scrape_interval: 15s
    scrape_timeout: 10s
    metrics_path: /metrics
    scheme: http
    follow_redirects: true
    static_configs:
      - targets:
        - prometheus:9090
 
  # - job_name: otel-collector-internal
  #   static_configs:
  #     - targets: ['otel-collector:8888']

  # Scrape the metrics pipeline exporter
  # (Application metrics forwarded through OTLP receiver)
  - job_name: otel-collector-pipeline
    # metrics_path: '/metrics'  # Optional: Default path is /metrics
    static_configs:
      - targets: ['otel-collector:8889']
