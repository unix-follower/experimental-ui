volumes:
  prometheus-data:

networks:
  local-bridge:
    external: true

services:
  otel_collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: otel-collector
    hostname: otel-collector
    restart: "no"
    networks:
      local-bridge:
        ipv4_address: 192.168.2.10
    volumes:
      - ./otel-collector.yaml:/etc/otelcol-contrib/config.yaml
    ports:
      # - "4317:4317" # OTLP over gRPC, the default for most SDKs
      - "4318:4318" # OTLP over HTTP, for clients that don’t support gRPC
      - "55679:55679" # ZPages, a built-in debug UI you can open in the browser
    depends_on:
      - zipkin
      # - jaeger

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    hostname: prometheus
    restart: "no"
    ports:
      - "9090:9090"
    networks:
      local-bridge:
        ipv4_address: 192.168.2.8
    volumes:
      - prometheus-data:/prometheus
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-otlp-receiver

  zipkin:
    image: openzipkin/zipkin:latest
    container_name: zipkin
    hostname: zipkin
    restart: "no"
    ports:
      - "9411:9411"
    environment:
      - STORAGE_TYPE=mem
    networks:
      local-bridge:
        ipv4_address: 192.168.2.14

  # jaeger:
